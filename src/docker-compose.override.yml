# use this command to generate the password hash for SEQ_FIRSTRUN_ADMINPASSWORDHASH: echo 'Admin@1435' | docker run --rm -i datalust/seq config hash
services:
  eshopdb:
    container_name: eshopdb
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=EShopDb
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_eshopdb:/var/lib/postgresql/data/    
  
  distributedcache:
    container_name: distributedcache
    restart: always
    ports:
      - "6379:6379"

  seq:
    container_name: seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORDHASH=QPzgOKJGUY8cYZvG69S/PRM+SeakZnAaHE/A3kzbir3dMA6Cjo3Ln24zs9cScKPv5r+NQ0IxfHFoj41bWReoDIxTER9mV44iQlHSVaQr0gNJ
    restart: always
    ports:
      - "5341:5341"
      - "9091:80"

  messagebus:
    container_name: messagebus
    hostname: ecommerce-mq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  identity:
    container_name: identity
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://eshopdb/EShopDb?currentSchema=identity
      - KC_DB_USERNAME=postgres
      - KC_DB_PASSWORD=postgres
      # - KC_HOSTNAME=http://identity:9090/
      # - KC_HTTP_PORT=9090
    restart: always
    ports:
      - "9090:8080"
    command:
      - start-dev